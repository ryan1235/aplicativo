<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GG Coalition - Painel Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-base: #060b13;
        --bg-surface: #0a1321;
        --bg-surface-hover: #122036;
        --border-color: #1d3353;
        --text-primary: #edf6ff;
        --text-secondary: #99abc4;
        --accent: #5eead4;
        --danger: #f87171;
        --success: #34d399;
        --warning: #fbbf24;
        --sidebar-width: 260px;
        --header-height: 70px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }

      body {
        background-color: var(--bg-base);
        color: var(--text-primary);
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Sidebar */
      .sidebar {
        width: var(--sidebar-width);
        background-color: var(--bg-surface);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        padding: 20px 0;
        z-index: 10;
      }

      .brand {
        font-size: 20px;
        font-weight: 700;
        color: var(--text-primary);
        padding: 0 24px 20px 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand span {
        color: var(--accent);
      }

      .nav-menu {
        flex: 1;
        overflow-y: auto;
      }

      .nav-item {
        padding: 12px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text-secondary);
        text-decoration: none;
        font-weight: 500;
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .nav-item:hover,
      .nav-item.active {
        background-color: var(--bg-surface-hover);
        color: var(--accent);
        border-right: 3px solid var(--accent);
      }

      /* Main Content */
      .main-wrapper {
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .header {
        height: var(--header-height);
        background-color: var(--bg-surface);
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 32px;
      }

      .header h1 {
        font-size: 18px;
        font-weight: 600;
      }

      .user-profile {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .content {
        flex: 1;
        padding: 32px;
        overflow-y: auto;
      }

      /* Dashboard Widgets */
      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 24px;
        margin-bottom: 32px;
      }

      .card {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s;
      }

      .card-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 16px;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .card-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--text-primary);
      }

      .card-value.accent {
        color: var(--accent);
      }

      /* Tables */
      .table-container {
        background-color: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 16px 24px;
        text-align: left;
        border-bottom: 1px solid var(--border-color);
      }

      th {
        background-color: var(--bg-surface-hover);
        color: var(--text-secondary);
        font-weight: 600;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background-color: rgba(29, 51, 83, 0.3);
      }

      .badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        display: inline-block;
      }

      .badge.admin {
        background-color: rgba(248, 113, 113, 0.1);
        color: var(--danger);
      }
      .badge.dev {
        background-color: rgba(94, 234, 212, 0.1);
        color: var(--accent);
      }
      .badge.winner {
        background-color: rgba(251, 191, 36, 0.1);
        color: var(--warning);
      }
      .badge.member {
        background-color: rgba(153, 171, 196, 0.1);
        color: var(--text-secondary);
      }

      .btn {
        background-color: var(--bg-surface-hover);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        transition: all 0.2s;
      }
      .btn:hover {
        background-color: var(--border-color);
      }
      .btn-danger {
        color: var(--danger);
        border-color: rgba(248, 113, 113, 0.3);
      }
      .btn-danger:hover {
        background-color: rgba(248, 113, 113, 0.1);
        border-color: var(--danger);
      }
      .btn-success {
        color: var(--success);
        border-color: rgba(52, 211, 153, 0.3);
      }
      .btn-success:hover {
        background-color: rgba(52, 211, 153, 0.1);
        border-color: var(--success);
      }

      .actions-group {
        display: flex;
        gap: 8px;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">GG <span>Panel</span></div>
      <div class="nav-menu">
        <a class="nav-item active">Dashboard</a>
        <a class="nav-item">Usuários</a>
        <!-- Outros menus para expansão futura -->
      </div>
    </aside>

    <main class="main-wrapper">
      <header class="header">
        <h1>Gestão de Usuários</h1>
        <div class="user-profile">
          <span style="font-weight: 500; font-size: 14px" id="status-conn"
            >Conectando...</span
          >
        </div>
      </header>

      <section class="content">
        <div class="dashboard-grid">
          <div class="card">
            <div class="card-header">Total de Usuários</div>
            <div class="card-value accent" id="total-users">0</div>
          </div>
        </div>

        <div class="table-container">
          <table id="users-table">
            <thead>
              <tr>
                <th>Usuário</th>
                <th>Cargo</th>
                <th>Status</th>
                <th>Último Login</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="user-table-body">
              <tr>
                <td
                  colspan="5"
                  style="text-align: center; color: var(--text-secondary)"
                >
                  Carregando dados da API...
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get("token");
      const apiUrl =
        urlParams.get("apiUrl") || "https://archpixel.squareweb.app";

      if (!token) {
        document.getElementById("status-conn").innerText =
          "Erro: Token não fornecido!";
        document.getElementById("status-conn").style.color = "var(--danger)";
      } else {
        document.getElementById("status-conn").innerText = "Autenticado API";
        document.getElementById("status-conn").style.color = "var(--success)";
        loadUsers();
      }

      async function loadUsers() {
        try {
          const response = await fetch(`${apiUrl}/chat/admin/users?take=100`, {
            headers: { Authorization: `Bearer ${token}` },
          });
          if (!response.ok)
            throw new Error("Acesso negado ou erro no servidor");

          const data = await response.json();
          document.getElementById("total-users").innerText = data.total;

          renderUsers(data.users);
        } catch (error) {
          document.getElementById("user-table-body").innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--danger);">
                            Erro ao carregar usuários: ${error.message}
                        </td>
                    </tr>
                `;
        }
      }

      function renderUsers(users) {
        const tbody = document.getElementById("user-table-body");
        tbody.innerHTML = "";

        users.forEach((user) => {
          const tr = document.createElement("tr");

          // Formatação do Role
          let roleClass = "member";
          if (user.role === "ADMIN") roleClass = "admin";
          if (user.role === "DEV") roleClass = "dev";
          if (user.role === "WINNER") roleClass = "winner";

          // Formatação da Data
          let dateStr = "Nunca";
          if (user.lastLoginAt) {
            const d = new Date(user.lastLoginAt);
            dateStr = `${d.toLocaleDateString()} ${d.toLocaleTimeString()}`;
          }

          // Block Status
          let statusHtml = `<span style="color: var(--success);">● Ativo</span>`;
          let blockBtn = `<button class="btn btn-danger" onclick="blockUser('${user.id}')">Bloquear</button>`;
          if (user.status === "BLOCKED") {
            statusHtml = `<span style="color: var(--danger);">● Bloqueado</span><br><span style="font-size:11px;color:var(--text-secondary)">${user.blockedReason || ""}</span>`;
            blockBtn = `<button class="btn btn-success" onclick="unblockUser('${user.id}')">Desbloquear</button>`;
          }

          tr.innerHTML = `
                    <td style="font-weight: 600;">
                        ${user.displayName || user.discordUsername || "Sem Nome"}
                        ${user.regiment ? `<span style="font-size:11px; color:var(--text-secondary)">[${user.regiment}]</span>` : ""}
                    </td>
                    <td><span class="badge ${roleClass}">${user.role || "MEMBER"}</span></td>
                    <td>${statusHtml}</td>
                    <td style="color: var(--text-secondary);">${dateStr}</td>
                    <td>
                        <div class="actions-group">
                            <button class="btn" onclick="changeRole('${user.id}', '${user.role}')">Cargo</button>
                            ${blockBtn}
                        </div>
                    </td>
                `;
          tbody.appendChild(tr);
        });
      }

      async function changeRole(userId, currentRole) {
        const newRole = prompt(
          "Digite o novo cargo (MEMBER, WINNER, ADMIN, DEV):",
          currentRole || "MEMBER",
        );
        if (!newRole || newRole === currentRole) return;

        try {
          const res = await fetch(`${apiUrl}/chat/admin/users/${userId}/role`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ role: newRole.toUpperCase() }),
          });
          if (!res.ok) throw new Error(await res.text());
          loadUsers(); // refresh
        } catch (err) {
          alert("Erro ao alterar cargo: " + err.message);
        }
      }

      async function blockUser(userId) {
        const reason = prompt(
          "Motivo do bloqueio (ficará visível para o usuário):",
          "Violação das regras",
        );
        if (!reason) return;

        try {
          const res = await fetch(
            `${apiUrl}/chat/admin/users/${userId}/block`,
            {
              method: "PATCH",
              headers: {
                "Content-Type": "application/json",
                Authorization: `Bearer ${token}`,
              },
              body: JSON.stringify({ reason: reason }),
            },
          );
          if (!res.ok) throw new Error(await res.text());
          loadUsers(); // refresh
        } catch (err) {
          alert("Erro ao bloquear: " + err.message);
        }
      }

      async function unblockUser(userId) {
        if (!confirm("Tem certeza que deseja desbloquear este usuário?"))
          return;

        try {
          const res = await fetch(
            `${apiUrl}/chat/admin/users/${userId}/unblock`,
            {
              method: "PATCH",
              headers: { Authorization: `Bearer ${token}` },
            },
          );
          if (!res.ok) throw new Error(await res.text());
          loadUsers(); // refresh
        } catch (err) {
          alert("Erro ao desbloquear: " + err.message);
        }
      }
    </script>
  </body>
</html>
